name: Bug report
description: Report a bug in the Tree-of-Thought Location Agent
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, what you expected, and what actually happened.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce.
      placeholder: |
        1. Run `tot ...`
        2. Enter `...`
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tot-agent version
      description: Output of `tot --version`
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: shell
